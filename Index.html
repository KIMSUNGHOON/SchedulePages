<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Deep Dive - Paper Knowledge Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0e1a;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0.7) 80%, transparent 100%);
    padding: 20px 30px 30px;
    pointer-events: none;
  }
  #header h1 {
    font-size: 22px; font-weight: 600; color: #fff;
    letter-spacing: -0.3px;
  }
  #header p {
    font-size: 13px; color: #8892b0; margin-top: 4px;
  }

  #legend {
    position: fixed; top: 20px; right: 30px; z-index: 100;
    display: flex; flex-direction: column; gap: 6px;
    background: rgba(15,20,35,0.85);
    border: 1px solid rgba(100,120,180,0.2);
    border-radius: 10px; padding: 14px 18px;
    backdrop-filter: blur(10px);
  }
  #legend h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6a7899; margin-bottom: 4px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #b0b8d0; cursor: pointer;
    transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 0.7; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  #tooltip {
    position: fixed; z-index: 200;
    background: rgba(15, 20, 40, 0.95);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px; padding: 16px 20px;
    max-width: 380px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip h3 { font-size: 14px; color: #fff; margin-bottom: 6px; line-height: 1.3; }
  #tooltip .meta { font-size: 11px; color: #7888a8; margin-bottom: 8px; }
  #tooltip .keywords { display: flex; flex-wrap: wrap; gap: 4px; }
  #tooltip .kw {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(100,140,255,0.15); color: #8aaeff;
  }
  #tooltip .summary { font-size: 12px; color: #a0aac0; margin-top: 8px; line-height: 1.5; }
  #tooltip .relations { margin-top: 10px; font-size: 11px; color: #7888a8; }
  #tooltip .relations span { color: #6aefcf; }

  #graph { width: 100%; height: 100vh; }

  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 8px;
    background: rgba(15,20,35,0.85);
    border: 1px solid rgba(100,120,180,0.2);
    border-radius: 10px; padding: 8px 12px;
    backdrop-filter: blur(10px);
  }
  .ctrl-btn {
    background: rgba(100,140,255,0.1); border: 1px solid rgba(100,140,255,0.2);
    color: #8aaeff; border-radius: 6px; padding: 6px 14px;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(100,140,255,0.25); }
  .ctrl-btn.active { background: rgba(100,140,255,0.3); border-color: rgba(100,140,255,0.5); }

  #info-panel {
    position: fixed; bottom: 20px; right: 30px; z-index: 100;
    font-size: 11px; color: #4a5670;
  }
</style>
</head>
<body>

<div id="header">
  <h1>AI Deep Dive — Paper Knowledge Map</h1>
  <p>13 papers across 5 research clusters · Click nodes for details · Drag to rearrange · Scroll to zoom</p>
</div>

<div id="legend">
  <h3>Research Clusters</h3>
  <div class="legend-item" data-cluster="attention"><div class="legend-dot" style="background:#6a8eff"></div>Attention Mechanisms</div>
  <div class="legend-item" data-cluster="hardware"><div class="legend-dot" style="background:#ff6a9e"></div>GPU Architecture</div>
  <div class="legend-item" data-cluster="serving"><div class="legend-dot" style="background:#6aefcf"></div>LLM Serving & Inference</div>
  <div class="legend-item" data-cluster="model"><div class="legend-dot" style="background:#ffb86a"></div>Model Architecture</div>
  <div class="legend-item" data-cluster="reasoning"><div class="legend-dot" style="background:#c06aff"></div>Reasoning & Agents</div>
</div>

<svg id="graph"></svg>

<div id="controls">
  <button class="ctrl-btn" onclick="resetZoom()">Reset View</button>
  <button class="ctrl-btn" id="btn-labels" onclick="toggleLabels()">Toggle Labels</button>
  <button class="ctrl-btn" onclick="highlightEvolution()">FA Evolution</button>
</div>

<div id="info-panel">Sean's AI Research · 2022–2025</div>

<div id="tooltip">
  <h3 id="tt-title"></h3>
  <div class="meta" id="tt-meta"></div>
  <div class="keywords" id="tt-keywords"></div>
  <div class="summary" id="tt-summary"></div>
  <div class="relations" id="tt-relations"></div>
</div>

<script>
const clusterColors = {
  attention: "#6a8eff",
  hardware: "#ff6a9e",
  serving: "#6aefcf",
  model: "#ffb86a",
  reasoning: "#c06aff"
};

const papers = [
  {
    id: "fa1", title: "FlashAttention", subtitle: "Fast and Memory-Efficient Exact Attention with IO-Awareness",
    author: "Tri Dao", year: 2022, cluster: "attention",
    keywords: ["IO-aware", "tiling", "memory efficiency", "HBM", "SRAM"],
    summary: "GPU 메모리 계층을 고려한 최초의 IO-aware attention 알고리즘. Tiling과 recomputation으로 O(N) 메모리 복잡도 달성.",
    size: 28
  },
  {
    id: "fa2", title: "FlashAttention-2", subtitle: "Faster Attention with Better Parallelism and Work Partitioning",
    author: "Tri Dao", year: 2023, cluster: "attention",
    keywords: ["parallelism", "work partitioning", "warp-level", "occupancy"],
    summary: "FA1 대비 2x 속도 향상. Sequence 차원 병렬화, warp 간 work partitioning 최적화로 A100에서 최대 230 TFLOPs 달성.",
    size: 26
  },
  {
    id: "fa3", title: "FlashAttention-3", subtitle: "Fast and Accurate Attention with Asynchrony and Low-precision",
    author: "Jay Shah", year: 2024, cluster: "attention",
    keywords: ["Hopper", "warp specialization", "WGMMA", "FP8", "asynchronous"],
    summary: "Hopper 아키텍처 활용. Producer-consumer warpgroup 패턴으로 비동기 파이프라이닝, FP8 지원, 740 TFLOPs 달성.",
    size: 30
  },
  {
    id: "flashinfer", title: "FlashInfer", subtitle: "Efficient and Customizable Attention Engine for LLM Inference Serving",
    author: "Zihao Ye", year: 2025, cluster: "serving",
    keywords: ["attention engine", "KV-cache", "composable templates", "batch scheduling"],
    summary: "다양한 attention variant를 지원하는 커스터마이저블 attention 엔진. Block sparse attention, paged KV-cache 최적화.",
    size: 22
  },
  {
    id: "sglang", title: "SGLang", subtitle: "Efficient Execution of Structured Language Model Programs",
    author: "Lianmin Zheng", year: 2024, cluster: "serving",
    keywords: ["structured generation", "RadixAttention", "KV cache reuse", "throughput"],
    summary: "구조화된 LLM 프로그램의 효율적 실행. RadixAttention으로 KV cache 재사용, 최대 6.4x throughput 향상.",
    size: 22
  },
  {
    id: "hopper", title: "Hopper Microbenchmarking", subtitle: "Dissecting the NVIDIA Hopper Architecture through Microbenchmarking",
    author: "Weile Luo", year: 2025, cluster: "hardware",
    keywords: ["tensor cores", "memory subsystem", "SM architecture", "L2 cache", "TMA"],
    summary: "H100 아키텍처의 체계적 마이크로벤치마킹. Tensor core, 메모리 서브시스템, TMA 등 하드웨어 특성 정량 분석.",
    size: 24
  },
  {
    id: "sparsetir", title: "SparseTIR", subtitle: "Composable Abstractions for Sparse Compilation in Deep Learning",
    author: "Zihao Ye", year: 2023, cluster: "hardware",
    keywords: ["sparse tensors", "compiler", "TVM", "format decomposition"],
    summary: "딥러닝 sparse 연산을 위한 composable 컴파일러 추상화. Format decomposition으로 다양한 sparse 패턴 지원.",
    size: 18
  },
  {
    id: "deepseek", title: "DeepSeek-V3", subtitle: "Technical Report",
    author: "DeepSeek-AI", year: 2025, cluster: "model",
    keywords: ["MoE", "MLA", "multi-token prediction", "FP8 training", "671B"],
    summary: "671B MoE 모델. Multi-head Latent Attention(MLA), auxiliary-loss-free load balancing, FP8 mixed precision training.",
    size: 30
  },
  {
    id: "megascale", title: "MegaScale-Infer", subtitle: "Serving MoE at Scale with Disaggregated Expert Parallelism",
    author: "Ruidong Zhu", year: 2025, cluster: "serving",
    keywords: ["MoE serving", "expert parallelism", "disaggregated", "GPU utilization"],
    summary: "MoE 모델의 대규모 서빙. Expert parallelism을 disaggregated 아키텍처로 구현, GPU 활용률 극대화.",
    size: 22
  },
  {
    id: "eagle3", title: "EAGLE-3", subtitle: "Scaling up Inference Acceleration via Training-Time Test",
    author: "Yuhui Li", year: 2025, cluster: "serving",
    keywords: ["speculative decoding", "draft model", "training-time test", "acceleration"],
    summary: "Training-time test로 speculative decoding 성능 향상. Draft model의 feature prediction을 학습 단계에서 최적화.",
    size: 20
  },
  {
    id: "deepthink", title: "Deep Think with Confidence", subtitle: "Test-time Scaling with Confidence Filtering",
    author: "Yichao Fu", year: 2025, cluster: "reasoning",
    keywords: ["test-time scaling", "confidence filtering", "reasoning traces", "compute allocation"],
    summary: "Confidence 기반 test-time compute 할당. 불필요한 reasoning trace를 필터링하여 효율적 inference scaling.",
    size: 20
  },
  {
    id: "reasoning_survey", title: "LLM Reasoning Survey", subtitle: "Frontiers in LLM Reasoning: Inference Scaling, Learning to Reason, and Agentic Systems",
    author: "Zixuan Ke", year: 2025, cluster: "reasoning",
    keywords: ["chain-of-thought", "inference scaling", "agentic systems", "learning to reason"],
    summary: "LLM 추론의 최전선을 총망라한 서베이. Inference scaling laws, CoT, agentic reasoning까지 포괄적 정리.",
    size: 24
  },
  {
    id: "agentic", title: "Agentic AI Systems", subtitle: "Efficient and Scalable Agentic AI with Heterogeneous Systems",
    author: "Zain Asgar", year: 2025, cluster: "reasoning",
    keywords: ["heterogeneous hardware", "dynamic orchestration", "multi-agent", "cost optimization"],
    summary: "이기종 하드웨어에서의 효율적 Agentic AI. CPU/GPU/NPU 동적 오케스트레이션으로 비용 대비 성능 최적화.",
    size: 20
  }
];

// Relationships between papers
const links = [
  // FlashAttention evolution chain
  { source: "fa1", target: "fa2", type: "evolution", label: "successor" },
  { source: "fa2", target: "fa3", type: "evolution", label: "successor" },
  // FA → serving/engine connections
  { source: "fa1", target: "flashinfer", type: "builds_on", label: "foundation" },
  { source: "fa3", target: "flashinfer", type: "builds_on", label: "kernel basis" },
  { source: "fa2", target: "sglang", type: "builds_on", label: "attention backend" },
  // Hardware ↔ Attention
  { source: "hopper", target: "fa3", type: "enables", label: "H100 features" },
  { source: "sparsetir", target: "flashinfer", type: "related", label: "same author" },
  // DeepSeek connections
  { source: "deepseek", target: "megascale", type: "builds_on", label: "MoE serving" },
  { source: "deepseek", target: "fa2", type: "uses", label: "uses MLA/attention" },
  // Serving cluster
  { source: "sglang", target: "flashinfer", type: "related", label: "serving stack" },
  { source: "eagle3", target: "sglang", type: "related", label: "inference opt." },
  { source: "megascale", target: "sglang", type: "related", label: "serving infra" },
  // Reasoning cluster
  { source: "deepthink", target: "reasoning_survey", type: "related", label: "test-time scaling" },
  { source: "agentic", target: "reasoning_survey", type: "related", label: "agentic systems" },
  // Cross-cluster
  { source: "reasoning_survey", target: "eagle3", type: "related", label: "inference scaling" },
  { source: "agentic", target: "megascale", type: "related", label: "heterogeneous serving" },
];

// D3 Setup
const width = window.innerWidth;
const height = window.innerHeight;
const svg = d3.select("#graph").attr("width", width).attr("height", height);

// Defs for gradients and glows
const defs = svg.append("defs");

// Glow filter
const filter = defs.append("filter").attr("id", "glow");
filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "coloredBlur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Arrow markers
defs.append("marker")
  .attr("id", "arrowhead")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 25).attr("refY", 0)
  .attr("markerWidth", 6).attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-4L8,0L0,4")
  .attr("fill", "#3a4a70");

const g = svg.append("g");

// Zoom behavior
const zoom = d3.zoom()
  .scaleExtent([0.3, 4])
  .on("zoom", (event) => g.attr("transform", event.transform));
svg.call(zoom);

// Force simulation
const simulation = d3.forceSimulation(papers)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.type === "evolution") return 120;
    if (d.type === "builds_on") return 150;
    return 180;
  }).strength(d => d.type === "evolution" ? 0.8 : 0.3))
  .force("charge", d3.forceManyBody().strength(-600))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => d.size + 20))
  .force("x", d3.forceX(width / 2).strength(0.04))
  .force("y", d3.forceY(height / 2).strength(0.04));

// Draw links
const link = g.append("g")
  .selectAll("line")
  .data(links)
  .join("line")
  .attr("stroke", d => {
    if (d.type === "evolution") return "#6a8eff";
    if (d.type === "enables") return "#ff6a9e";
    if (d.type === "builds_on") return "#6aefcf";
    return "#2a3550";
  })
  .attr("stroke-width", d => d.type === "evolution" ? 2.5 : 1.5)
  .attr("stroke-opacity", d => d.type === "evolution" ? 0.7 : 0.3)
  .attr("stroke-dasharray", d => d.type === "related" ? "4,4" : "none")
  .attr("marker-end", d => d.type === "evolution" ? "url(#arrowhead)" : "");

// Link labels
const linkLabel = g.append("g")
  .selectAll("text")
  .data(links)
  .join("text")
  .text(d => d.label)
  .attr("font-size", 9)
  .attr("fill", "#4a5a80")
  .attr("text-anchor", "middle")
  .attr("opacity", 0);

// Draw nodes
const node = g.append("g")
  .selectAll("g")
  .data(papers)
  .join("g")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

// Node outer glow ring
node.append("circle")
  .attr("r", d => d.size + 4)
  .attr("fill", "none")
  .attr("stroke", d => clusterColors[d.cluster])
  .attr("stroke-width", 1.5)
  .attr("stroke-opacity", 0.15)
  .attr("filter", "url(#glow)");

// Node circle
node.append("circle")
  .attr("r", d => d.size)
  .attr("fill", d => {
    const c = clusterColors[d.cluster];
    return c + "20";
  })
  .attr("stroke", d => clusterColors[d.cluster])
  .attr("stroke-width", 2)
  .attr("stroke-opacity", 0.6)
  .style("cursor", "pointer");

// Year badge
node.append("text")
  .text(d => d.year)
  .attr("text-anchor", "middle")
  .attr("dy", -2)
  .attr("font-size", 10)
  .attr("font-weight", 600)
  .attr("fill", d => clusterColors[d.cluster])
  .attr("opacity", 0.9)
  .style("pointer-events", "none");

// Node labels
let showLabels = true;
const labels = node.append("text")
  .text(d => d.title)
  .attr("text-anchor", "middle")
  .attr("dy", d => d.size + 16)
  .attr("font-size", 11)
  .attr("font-weight", 500)
  .attr("fill", "#c0c8e0")
  .style("pointer-events", "none");

// Interaction
const tooltip = d3.select("#tooltip");

node.on("mouseover", function(event, d) {
  // Highlight connected
  const connected = new Set();
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);

  node.selectAll("circle")
    .attr("stroke-opacity", n => connected.has(n.id) ? 1 : 0.1)
    .attr("fill-opacity", n => connected.has(n.id) ? 1 : 0.2);
  labels.attr("opacity", n => connected.has(n.id) ? 1 : 0.15);
  link
    .attr("stroke-opacity", l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      return (sid === d.id || tid === d.id) ? 0.8 : 0.05;
    });
  linkLabel.attr("opacity", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    return (sid === d.id || tid === d.id) ? 1 : 0;
  });

  // Tooltip
  const relatedPapers = [];
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === d.id) {
      const t = papers.find(p => p.id === tid);
      relatedPapers.push(`<span>${t.title}</span> (${l.label})`);
    }
    if (tid === d.id) {
      const s = papers.find(p => p.id === sid);
      relatedPapers.push(`<span>${s.title}</span> (${l.label})`);
    }
  });

  d3.select("#tt-title").text(d.title);
  d3.select("#tt-meta").text(`${d.author} · ${d.year}`);
  d3.select("#tt-keywords").html(d.keywords.map(k => `<span class="kw">${k}</span>`).join(""));
  d3.select("#tt-summary").text(d.summary);
  d3.select("#tt-relations").html(relatedPapers.length ?
    "Connected: " + relatedPapers.join(" · ") : "");

  tooltip.classed("visible", true);
})
.on("mousemove", function(event) {
  const tx = Math.min(event.clientX + 15, width - 400);
  const ty = Math.min(event.clientY - 10, height - 250);
  tooltip.style("left", tx + "px").style("top", ty + "px");
})
.on("mouseout", function() {
  node.selectAll("circle").attr("stroke-opacity", 0.6).attr("fill-opacity", 1);
  labels.attr("opacity", 1);
  link.attr("stroke-opacity", d => d.type === "evolution" ? 0.7 : 0.3);
  linkLabel.attr("opacity", 0);
  tooltip.classed("visible", false);
});

// Simulation tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  linkLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Drag functions
function dragstarted(event) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}
function dragged(event) {
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}
function dragended(event) {
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}

// Controls
function resetZoom() {
  svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
}

function toggleLabels() {
  showLabels = !showLabels;
  labels.transition().duration(300).attr("opacity", showLabels ? 1 : 0);
  d3.select("#btn-labels").classed("active", !showLabels);
}

function highlightEvolution() {
  const faIds = new Set(["fa1", "fa2", "fa3"]);

  node.selectAll("circle")
    .transition().duration(400)
    .attr("stroke-opacity", n => faIds.has(n.id) ? 1 : 0.1)
    .attr("fill-opacity", n => faIds.has(n.id) ? 1 : 0.15);
  labels.transition().duration(400)
    .attr("opacity", n => faIds.has(n.id) ? 1 : 0.1);
  link.transition().duration(400)
    .attr("stroke-opacity", l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      return (faIds.has(sid) && faIds.has(tid)) ? 1 : 0.05;
    });

  setTimeout(() => {
    node.selectAll("circle")
      .transition().duration(600)
      .attr("stroke-opacity", 0.6).attr("fill-opacity", 1);
    labels.transition().duration(600).attr("opacity", 1);
    link.transition().duration(600)
      .attr("stroke-opacity", d => d.type === "evolution" ? 0.7 : 0.3);
  }, 3000);
}

// Legend filter
d3.selectAll(".legend-item").on("click", function() {
  const cluster = this.dataset.cluster;
  const isActive = this.classList.toggle("active");

  if (isActive) {
    node.selectAll("circle")
      .transition().duration(300)
      .attr("stroke-opacity", n => n.cluster === cluster ? 1 : 0.1)
      .attr("fill-opacity", n => n.cluster === cluster ? 1 : 0.15);
    labels.transition().duration(300)
      .attr("opacity", n => n.cluster === cluster ? 1 : 0.1);
  } else {
    node.selectAll("circle")
      .transition().duration(300)
      .attr("stroke-opacity", 0.6).attr("fill-opacity", 1);
    labels.transition().duration(300).attr("opacity", 1);
  }
  d3.selectAll(".legend-item").each(function() {
    if (this.dataset.cluster !== cluster) this.classList.remove("active");
  });
});
</script>
</body>
</html>
